<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2f6b4f" />
    <title>Offline | Urban Harvest Hub</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #f6f3ec 0%, #fdfcf8 100%);
        color: #1f2937;
        font-family: Poppins, sans-serif;
      }

      main {
        max-width: 36rem;
        margin: 1.5rem;
        padding: 2rem;
        border-radius: 1.5rem;
        background: #ffffff;
        box-shadow: 0 12px 30px rgba(47, 107, 79, 0.12);
      }

      h1 {
        margin: 0 0 1rem;
        color: #2f6b4f;
      }

      p {
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You're offline</h1>
      <p>
        Urban Harvest Hub can still display previously cached pages and assets.
        Reconnect to refresh live content from the API.
      </p>
    </main>
  </body>
</html>
